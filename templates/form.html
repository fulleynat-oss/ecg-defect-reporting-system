{% extends "layout.html" %}{% block content %}<div class="card"><h2>Submit Station Defect</h2><p class="small">Station attendants fill this page only.</p><form method="post" enctype="multipart/form-data"><div class="grid grid-2"><div><label>Station</label>{% if user.role == 'station' and user.station %}<input name="station" value="{{ user.station }}" readonly>{% else %}<select name="station" required><option value="">Select station</option>{% for s in stations %}<option>{{ s }}</option>{% endfor %}</select>{% endif %}</div><div><label>Feeder / Area</label><input name="feeder_area" placeholder="Bekwai 1, Control Room, Switching Yard" required></div><div><label>Equipment</label><select name="equipment" required><option value="">Select equipment</option>{% for e in equipment %}<option>{{ e }}</option>{% endfor %}</select></div><div><label>Severity</label><select name="severity" required><option value="">Select severity</option>{% for s in severities %}<option>{{ s }}</option>{% endfor %}</select></div><div><label>Status</label><select name="status">{% for s in statuses %}<option>{{ s }}</option>{% endfor %}</select></div><div><label>Target Date</label><input name="target_date" type="date"></div></div><label>Defect Description</label><textarea name="defect" required></textarea><label>Recommended Action</label><textarea name="recommended_action"></textarea><div class="grid grid-2"><div><label>Responsible Person</label><input name="responsible_person"></div><div><label>Attach Photo</label><input type="file" name="photo" accept="image/*"></div></div><label>Remarks</label><textarea name="remarks"></textarea><br><button type="submit">Submit Defect</button></form></div>{% endblock %}
